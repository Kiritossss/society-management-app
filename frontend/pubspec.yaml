name: society_management
description: Multi-tenant Society Management App
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP client
  dio: ^5.4.3+1

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Local preferences (society_id, etc.)
  shared_preferences: ^2.3.2

  # UI utilities
  cupertino_icons: ^1.0.8
  loading_animation_widget: ^1.2.0+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
